name: Publish OCI Helm Chart

on:
  workflow_run:
    workflows:
      - Publish GHCR Image
    types:
      - completed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REGISTRY: ghcr.io
  CHART_DIR: charts/bee-slack

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Lowercase repository owner
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_OUTPUT}"

      - name: Read package version
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p 'require("./package.json").version')"
          echo "package=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Sync chart metadata from package version
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          version = json.loads(Path("package.json").read_text())["version"]
          chart_path = Path("charts/bee-slack/Chart.yaml")
          chart_text = chart_path.read_text()
          chart_text = re.sub(r"^version: .*$", f"version: {version}", chart_text, flags=re.MULTILINE)
          chart_text = re.sub(r'^appVersion: ".*"$', f'appVersion: "{version}"', chart_text, flags=re.MULTILINE)
          chart_path.write_text(chart_text)
          PY

      - name: Lint chart
        run: helm lint "${CHART_DIR}" -f "${CHART_DIR}/values-existing-secret.example.yaml"

      - name: Package chart
        run: helm package "${CHART_DIR}"

      - name: Log in to GHCR
        shell: bash
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "${REGISTRY}" -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: helm push "bee-slack-${{ steps.versions.outputs.package }}.tgz" "oci://${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/helm-charts"
